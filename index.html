<body>

	<!-- 搜索框区域 -->
	<div class="baidu baidu-2">
		<!-- 搜索表单：默认使用 Google 搜索 -->
		<form name="f" action="https://www.google.com/search" target="_blank">
			<div id="Select-2">
				<!-- 搜索引擎选择器 -->
				<div class="Select-box-2" id="baidu">
					<ul style="height: 47px;">
						<!-- 默认选中：Google -->
						<li class="this_s">谷 歌</li>
						<!-- 其他搜索引擎选项 -->
						<li class="baidu_s">必 应</li>
						<li class="magi_s">PubMed</li>
					</ul>
				</div>
				<!-- 搜索输入框 -->
				<input name="q" id="kw-2" maxlength="100" autocomplete="off" type="text">
			</div>
			<!-- 清空按钮 -->
			<div class="qingkong" id="qingkong" title="清空">x</div>
			<!-- 提交按钮 -->
			<input value="搜 索" id="su-2" type="submit">
		</form>
	</div>
	<!-- 搜索框区域结束 -->


	<div class="body">
		<div class="content">
			<div class="jianjie" id="links-container">
				<!-- 链接将通过 JavaScript 从 links.json 自动生成 -->
			</div>
		</div>
	</div>

 <div class="footer">修改自<a href="https://www.jianavi.com/" style="color:#ffffff;" target="_blank">简约导航</a> | <a href="https://github.com/GrassArk/startpage.github.io" style="color:#ffffff;" target="_blank">项目源码</a></div>

<script type="text/javascript" src="source/jquery.js"></script>
<script type="text/javascript" src="source/js.js"></script>

<script>
	// 获取当前页面名称（用于从 links.json 读取对应配置）
	// work.html 使用 "work"，index.html 使用 "home"
	const currentPageName = window.location.pathname.endsWith('work.html') ? 'work' : 'home';

	// 从 links.json 加载配置并生成链接
	fetch('links.json')
		.then(response => response.json())
		.then(data => {
			const container = document.getElementById('links-container');
			const pageData = data.pages[currentPageName];

			if (!pageData) {
				container.innerHTML = '<p style="color:white;text-align:center;">页面配置未找到</p>';
				return;
			}

			pageData.blocks.forEach(block => {
				const blockDiv = document.createElement('div');
				blockDiv.className = 'jj-list';

				const titleDiv = document.createElement('div');
				titleDiv.className = 'jj-list-tit';
				titleDiv.textContent = block.name;
				blockDiv.appendChild(titleDiv);

				const ul = document.createElement('ul');
				ul.className = 'jj-list-con';

				block.links.forEach(link => {
					const li = document.createElement('li');
					const a = document.createElement('a');
					a.href = link.url;
					a.className = 'link-3';
					a.textContent = link.name;
					a.target = link.target || '_blank';
					li.appendChild(a);
					ul.appendChild(li);
				});

				blockDiv.appendChild(ul);
				container.appendChild(blockDiv);
			});
		})
		.catch(error => {
			console.error('加载链接配置失败:', error);
			document.getElementById('links-container').innerHTML = '<p style="color:white;text-align:center;">加载失败，请检查 links.json 文件</p>';
		});

	$(function(){
        initpage();
        $(window).resize(function()
        {
          initpage();
        })

        function initpage()
        {
          var view_width = document.getElementsByTagName('html')[0].getBoundingClientRect().width;
          var _html = document.getElementsByTagName('html')[0];
          view_width>640?_html.style.fontSize=640/16 +'px':_html.style.fontSize =view_width/16+'px';
        }
      });
</script>

</body>
