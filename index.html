<!DOCTYPE html>
<html><head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>StartPage</title>
<link rel="icon" href="source/favicon.svg" type="image/svg+xml">

<link href="source/style-new.css" rel="stylesheet" type="text/css">

</head>

<body>

	<!-- 搜索框区域 -->
	<div class="search-container search-container-main">
		<!-- 搜索表单：默认使用 Google 搜索 -->
		<form name="f" action="https://www.google.com/search" target="_blank">
			<div id="search-engine-wrapper">
				<!-- 搜索引擎选择器 -->
				<div class="search-engine-selector" id="search-engine-box">
					<ul style="height: 47px;">
						<!-- 默认选中：Google -->
						<li class="selected engine-google">谷 歌</li>
						<!-- 其他搜索引擎选项 -->
						<li class="engine-bing">必 应</li>
						<li class="engine-pubmed">PubMed</li>
					</ul>
				</div>
				<!-- 搜索输入框 -->
				<input name="q" id="search-input" maxlength="100" autocomplete="off" type="text">
			</div>
			<!-- 清空按钮 -->
			<div class="search-clear-btn" id="search-clear-btn" title="清空">x</div>
			<!-- 提交按钮 -->
			<input value="搜 索" id="search-submit" type="submit">
		</form>
	</div>
	<!-- 搜索框区域结束 -->


	<div class="body">
		<div class="content">
			<div class="jianjie" id="links-container">
				<!-- 链接将通过 JavaScript 从 links.json 自动生成 -->
			</div>
		</div>
	</div>

 <div class="footer">修改自<a href="https://www.jianavi.com/" style="color:#ffffff;" target="_blank">简约导航</a> | <a href="https://github.com/GrassArk/startpage.github.io" style="color:#ffffff;" target="_blank">项目源码</a></div>

<script type="text/javascript" src="source/main.js"></script>

<script>
	// 获取页面参数，默认为 home
	const urlParams = new URLSearchParams(window.location.search);
	const currentPageName = urlParams.get('page') || 'home';

	// 从 links.json 加载配置并生成链接
	fetch('links.json')
		.then(response => response.json())
		.then(data => {
			const container = document.getElementById('links-container');
			const pageData = data.pages[currentPageName];

			if (!pageData) {
				container.innerHTML = `<p style="color:white;text-align:center;">页面配置 "${currentPageName}" 未找到</p>`;
				return;
			}

			// 动态更新标题和图标
			document.title = currentPageName === 'home' ? data.title : `${data.title} - ${currentPageName.charAt(0).toUpperCase() + currentPageName.slice(1)}`;
			const favicon = document.querySelector('link[rel="icon"]');
			if (favicon) {
				favicon.href = currentPageName === 'work' ? 'source/favicon-work.svg' : 'source/favicon.svg';
			}

			pageData.blocks.forEach(block => {
				const blockDiv = document.createElement('div');
				blockDiv.className = 'jj-list';

				const titleDiv = document.createElement('div');
				titleDiv.className = 'jj-list-tit';
				titleDiv.textContent = block.name;
				blockDiv.appendChild(titleDiv);

				const ul = document.createElement('ul');
				ul.className = 'jj-list-con';

				block.links.forEach(link => {
					const li = document.createElement('li');
					const a = document.createElement('a');
					
					// 自动处理内部跳转，如果是跳转到 work.html 改为 ?page=work
					if (link.url === 'work.html') {
						a.href = '?page=work';
					} else if (link.url === 'index.html') {
						a.href = '?page=home';
					} else {
						a.href = link.url;
					}

					a.className = 'link-3';
					a.textContent = link.name;
					a.target = link.target || '_blank';
					li.appendChild(a);
					ul.appendChild(li);
				});

				blockDiv.appendChild(ul);
				container.appendChild(blockDiv);
			});
		})
		.catch(error => {
			console.error('加载链接配置失败:', error);
			document.getElementById('links-container').innerHTML = '<p style="color:white;text-align:center;">加载失败，请检查 links.json 文件</p>';
		});

    document.addEventListener('DOMContentLoaded', () => {
        initpage();
        window.addEventListener('resize', initpage);

        function initpage() {
            var view_width = document.documentElement.getBoundingClientRect().width;
            var _html = document.documentElement;
            view_width > 640 ? _html.style.fontSize = 640 / 16 + 'px' : _html.style.fontSize = view_width / 16 + 'px';
        }
    });
</script>

</body>

</html>
